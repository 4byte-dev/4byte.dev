name: Lint

on:
    push:
    pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: pnpm

            - run: pnpm install --frozen-lockfile
            - run: pnpm run format:check
            - run: pnpm run lint
            - run: pnpm run check
