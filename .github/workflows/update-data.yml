name: Update Data Files

on:
    push:
        branches: [main]
        paths:
            - 'content/**/*.md'
    workflow_dispatch:

jobs:
    update:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                  persist-credentials: false

            - name: Set up Node
              uses: actions/setup-node@v3
              with:
                  node-version: 18
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run update script
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: node scripts/update-data.mjs

            - name: Commit & push changes
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add src/data/tags.json src/data/categories.json src/data/articles.json
                  if ! git diff --cached --quiet; then
                    git commit -m "chore(data): auto‑update tags, categories & articles"
                    git push origin HEAD:${{ github.ref }}
                  fi

            - name: Create PR if needed
              if: github.ref != 'refs/heads/main'
              uses: peter-evans/create-pull-request@v5
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: 'chore(data): auto‑update tags, categories & articles'
                  branch: update-data-${{ github.run_id }}
                  title: 'Auto‑generated data updates'
                  body: |
                      This PR contains updates to `tags.json`, `categories.json` and `articles.json`
                      generated from the latest markdown content.
                      New tags/categories have empty descriptions – please fill them in.
